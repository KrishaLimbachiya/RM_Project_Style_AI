<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StyleAI — Weather Stylist</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --primary:#c084fc;--secondary:#f472b6;--accent:#fbbf24;
  --dark:#18181b;--text:#27272a;--border:#e4e4e7;--success:#22c55e;
  --gradient:linear-gradient(135deg,#c084fc 0%,#f472b6 50%,#fbbf24 100%);
  --shadow:0 20px 60px rgba(192,132,252,0.15);
}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(180deg,#faf5ff 0%,#fef3c7 100%);min-height:100vh;color:var(--text);line-height:1.6;}
nav{background:rgba(255,255,255,0.9);backdrop-filter:blur(20px);padding:20px 0;box-shadow:0 4px 30px rgba(0,0,0,0.05);border-bottom:1px solid rgba(192,132,252,0.1);position:sticky;top:0;z-index:100;}
.nav-inner{max-width:1400px;margin:0 auto;padding:0 30px;display:flex;align-items:center;justify-content:space-between;gap:20px;}
.logo{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;}
.nav-links{display:flex;gap:6px;flex-wrap:wrap;}
.nav-link{padding:9px 16px;border-radius:10px;font-size:14px;font-weight:600;color:#52525b;text-decoration:none;cursor:pointer;border:none;background:none;transition:all 0.2s;white-space:nowrap;}
.nav-link:hover{background:#faf5ff;color:var(--primary);}
.nav-link.active{background:var(--gradient);color:#fff;}
.nav-user{display:flex;align-items:center;gap:10px;font-size:14px;color:#52525b;white-space:nowrap;}
.nav-user strong{color:var(--dark);}
.logout-btn{padding:8px 16px;border:2px solid var(--border);border-radius:10px;background:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;color:#71717a;cursor:pointer;transition:all 0.2s;}
.logout-btn:hover{border-color:var(--primary);color:var(--primary);}

.container{max-width:1000px;margin:0 auto;padding:50px 30px;}
.page-header{text-align:center;margin-bottom:48px;}
.page-header h1{font-family:'Playfair Display',serif;font-size:3rem;font-weight:900;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1px;margin-bottom:12px;}
.page-header p{color:#71717a;font-size:1.1rem;}

/* Weather card */
.weather-card{background:#fff;border-radius:24px;padding:36px;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:32px;}
.weather-card h2{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--dark);margin-bottom:22px;}

.location-row{display:flex;gap:12px;margin-bottom:18px;align-items:flex-end;}
.loc-field{flex:1;}
.loc-field label{display:block;font-weight:700;font-size:14px;color:var(--dark);margin-bottom:8px;}
.loc-field label i{margin-right:7px;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.loc-field input{width:100%;padding:14px 16px;border:2px solid var(--border);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);outline:none;transition:border-color 0.25s;}
.loc-field input:focus{border-color:var(--primary);}
.detect-btn{padding:14px 20px;background:#faf5ff;border:2px solid rgba(192,132,252,0.3);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;color:var(--primary);cursor:pointer;white-space:nowrap;transition:all 0.2s;}
.detect-btn:hover{background:var(--gradient);color:#fff;border-color:transparent;}

.occasion-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px;}
.occ-field label{display:block;font-weight:700;font-size:14px;color:var(--dark);margin-bottom:8px;}
.occ-field label i{margin-right:7px;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.occ-field select{width:100%;padding:14px 16px;border:2px solid var(--border);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);outline:none;transition:border-color 0.25s;background:#fff;}
.occ-field select:focus{border-color:var(--primary);}

.gen-btn{width:100%;padding:18px;background:var(--gradient);color:#fff;border:none;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all 0.3s;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;gap:10px;}
.gen-btn:hover{transform:translateY(-2px);box-shadow:0 25px 70px rgba(192,132,252,0.25);}
.gen-btn:disabled{opacity:0.65;cursor:not-allowed;transform:none;}
.spin{width:20px;height:20px;border:3px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Weather display */
.weather-display{background:linear-gradient(135deg,#faf5ff 0%,#fef3c7 100%);border:2px solid rgba(192,132,252,0.15);border-radius:16px;padding:24px;margin-bottom:22px;display:none;}
.weather-display.show{display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
.weather-icon{font-size:4rem;line-height:1;}
.weather-info h3{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--dark);}
.weather-info .temp{font-size:1.1rem;color:#52525b;margin-top:4px;}
.weather-info .desc{font-size:14px;color:#71717a;margin-top:2px;}
.weather-tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.weather-tag{padding:5px 14px;background:#fff;border:1px solid var(--border);border-radius:20px;font-size:12px;font-weight:600;color:#52525b;}

/* Results */
.results-section{margin-top:10px;}
.loading-state{text-align:center;padding:60px 20px;}
.loading-state i{font-size:3.5rem;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:18px;animation:spin 2s linear infinite;}
.loading-state p{font-size:1.1rem;color:var(--text);font-weight:500;}

.outfit-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px;}
.outfit-card{background:#fff;border-radius:20px;padding:28px;border:1px solid var(--border);box-shadow:0 5px 20px rgba(0,0,0,0.06);transition:all 0.3s;}
.outfit-card:hover{transform:translateY(-6px);box-shadow:var(--shadow);}
.outfit-card h4{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--dark);margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.outfit-card h4 i{background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.outfit-items-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.outfit-item-chip{display:flex;align-items:center;gap:10px;background:#faf5ff;border-radius:10px;padding:10px 14px;}
.outfit-item-chip img{width:36px;height:36px;border-radius:8px;object-fit:cover;background:#f4f4f5;}
.outfit-item-chip .chip-name{font-size:13px;font-weight:600;color:var(--dark);}
.outfit-item-chip .chip-cat{font-size:11px;color:#71717a;}
.outfit-reasoning{background:linear-gradient(135deg,#faf5ff,#fef3c7);border-radius:12px;padding:14px;font-size:13px;color:#52525b;line-height:1.6;}
.outfit-reasoning strong{color:var(--primary);}

.error-state{background:#fef2f2;border:1.5px solid #fecaca;border-radius:14px;padding:20px 24px;color:#ef4444;font-weight:500;font-size:14px;}

@media(max-width:600px){
  .location-row{flex-direction:column;}
  .occasion-row{grid-template-columns:1fr;}
  .nav-links{display:none;}
}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <div class="logo"><i class="fas fa-gem"></i> StyleAI</div>
    <div class="nav-links">
      <a class="nav-link" href="/app">✨ Wardrobe</a>
      <a class="nav-link" href="/stats">📊 Stats</a>
      <a class="nav-link active" href="/weather">🌤 Weather Stylist</a>
      <a class="nav-link" href="/packing">🧳 Packing AI</a>
    </div>
    <div class="nav-user">
      <span>👤 <strong id="bar-user">…</strong></span>
      <button class="logout-btn" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
    </div>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1><i class="fas fa-cloud-sun"></i> Weather Stylist</h1>
    <p>Enter your city — we'll fetch live weather and style your perfect outfit from your wardrobe</p>
  </div>

  <div class="weather-card">
    <h2><i class="fas fa-map-marker-alt" style="background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;"></i> Your Location & Preferences</h2>

    <div class="location-row">
      <div class="loc-field">
        <label><i class="fas fa-city"></i>City</label>
        <input id="city-input" type="text" placeholder="e.g. Mumbai, London, New York" />
      </div>
      <button class="detect-btn" onclick="detectLocation()"><i class="fas fa-crosshairs"></i> Detect</button>
    </div>

    <div class="occasion-row">
      <div class="occ-field">
        <label><i class="fas fa-calendar-check"></i>Occasion</label>
        <select id="occasion-sel">
          <option value="casual">Casual Day Out</option>
          <option value="work">Work / Professional</option>
          <option value="formal">Formal Event</option>
          <option value="date">Date Night</option>
          <option value="party">Party / Social Event</option>
          <option value="sports">Sports / Gym</option>
          <option value="travel">Travel</option>
        </select>
      </div>
      <div class="occ-field">
        <label><i class="fas fa-thermometer-half"></i>Units</label>
        <select id="units-sel">
          <option value="metric">°C — Celsius</option>
          <option value="imperial">°F — Fahrenheit</option>
        </select>
      </div>
    </div>

    <div class="weather-display" id="weather-display">
      <div class="weather-icon" id="w-icon">🌤</div>
      <div class="weather-info">
        <h3 id="w-temp">—</h3>
        <div class="temp" id="w-city">—</div>
        <div class="desc" id="w-desc">—</div>
        <div class="weather-tags" id="w-tags"></div>
      </div>
    </div>

    <button class="gen-btn" id="gen-btn" onclick="generateWeatherOutfit()">
      <i class="fas fa-magic" id="gen-icon"></i>
      <span id="gen-txt">Fetch Weather &amp; Style My Outfit</span>
      <div class="spin" id="gen-spin"></div>
    </button>
  </div>

  <div class="results-section" id="results"></div>
</div>

<script>
const TOKEN=()=>localStorage.getItem('rm_token')||'';
const H=()=>({'Content-Type':'application/json','Authorization':'Bearer '+TOKEN()});
let wardrobeItems=[];
const OWM_KEY=''; // optional: add OpenWeatherMap free key here for real data

async function init(){
  try{
    const r=await fetch('/api/me',{headers:H()});
    if(!r.ok){window.location.href='/login';return;}
    const d=await r.json();
    document.getElementById('bar-user').textContent=d.username;
  }catch(e){window.location.href='/login';return;}
  const wr=await fetch('/api/wardrobe',{headers:H()});
  wardrobeItems=await wr.json();
}

function detectLocation(){
  if(!navigator.geolocation){alert('Geolocation not supported by your browser.');return;}
  const btn=document.querySelector('.detect-btn');
  btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Detecting…';
  navigator.geolocation.getCurrentPosition(async pos=>{
    const {latitude:lat,longitude:lon}=pos.coords;
    // Reverse geocode using open-meteo (no key needed)
    try{
      const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
      const d=await r.json();
      const city=d.address.city||d.address.town||d.address.village||d.address.county||'Your Location';
      document.getElementById('city-input').value=city;
    }catch(e){document.getElementById('city-input').value='Your Location';}
    btn.innerHTML='<i class="fas fa-check"></i> Detected!';
    setTimeout(()=>btn.innerHTML='<i class="fas fa-crosshairs"></i> Detect',2000);
  },err=>{
    alert('Could not detect location. Please type your city.');
    btn.innerHTML='<i class="fas fa-crosshairs"></i> Detect';
  });
}

async function fetchWeather(city,units){
  // Use Open-Meteo (free, no key) via geocoding + weather APIs
  const geoRes=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1`);
  const geoData=await geoRes.json();
  if(!geoData.results||!geoData.results.length) throw new Error('City not found. Try a different spelling.');
  const {latitude,longitude,name,country}=geoData.results[0];
  const tempUnit=units==='imperial'?'fahrenheit':'celsius';
  const wRes=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,weathercode,windspeed_10m,relativehumidity_2m&temperature_unit=${tempUnit}&windspeed_unit=kmh`);
  const wData=await wRes.json();
  const c=wData.current;
  return {temp:c.temperature_2m,unit:units==='imperial'?'°F':'°C',windspeed:c.windspeed_10m,humidity:c.relativehumidity_2m,code:c.weathercode,city:name,country};
}

function weatherInfo(code,temp,unit){
  // WMO weather codes to description + emoji + category
  const maps=[
    {codes:[0],desc:'Clear sky',emoji:'☀️',cat:'sunny'},
    {codes:[1,2,3],desc:'Partly cloudy',emoji:'⛅',cat:'cloudy'},
    {codes:[45,48],desc:'Foggy',emoji:'🌫️',cat:'cool'},
    {codes:[51,53,55,56,57],desc:'Drizzle',emoji:'🌦️',cat:'rainy'},
    {codes:[61,63,65,66,67],desc:'Rain',emoji:'🌧️',cat:'rainy'},
    {codes:[71,73,75,77],desc:'Snow',emoji:'❄️',cat:'cold'},
    {codes:[80,81,82],desc:'Rain showers',emoji:'🌩️',cat:'rainy'},
    {codes:[85,86],desc:'Snow showers',emoji:'🌨️',cat:'cold'},
    {codes:[95,96,99],desc:'Thunderstorm',emoji:'⛈️',cat:'rainy'},
  ];
  const match=maps.find(m=>m.codes.includes(code))||{desc:'Variable',emoji:'🌤️',cat:'cool'};
  // Override category based on temp
  const t=parseFloat(temp);
  let cat=match.cat;
  if(unit==='°C'){if(t>=30)cat='hot';else if(t>=20)cat='sunny';else if(t>=10)cat='cool';else cat='cold';}
  else{if(t>=86)cat='hot';else if(t>=68)cat='sunny';else if(t>=50)cat='cool';else cat='cold';}
  return {...match,cat};
}

async function generateWeatherOutfit(){
  const city=document.getElementById('city-input').value.trim();
  const units=document.getElementById('units-sel').value;
  const occasion=document.getElementById('occasion-sel').value;
  if(!city){alert('Please enter a city name.');return;}
  if(!wardrobeItems.length){
    document.getElementById('results').innerHTML=`<div class="error-state"><i class="fas fa-exclamation-circle"></i> Your wardrobe is empty! <a href="/app" style="color:var(--primary);font-weight:700;">Add some items first →</a></div>`;
    return;
  }

  setLoading(true);
  document.getElementById('results').innerHTML='';

  let weather;
  try{
    weather=await fetchWeather(city,units);
  }catch(e){
    setLoading(false);
    document.getElementById('results').innerHTML=`<div class="error-state"><i class="fas fa-exclamation-circle"></i> ${e.message}</div>`;
    return;
  }

  const info=weatherInfo(weather.code,weather.temp,weather.unit);

  // Show weather panel
  document.getElementById('w-icon').textContent=info.emoji;
  document.getElementById('w-temp').textContent=`${weather.temp}${weather.unit}`;
  document.getElementById('w-city').textContent=`${weather.city}, ${weather.country}`;
  document.getElementById('w-desc').textContent=info.desc;
  document.getElementById('w-tags').innerHTML=[
    `💨 Wind: ${weather.windspeed} km/h`,
    `💧 Humidity: ${weather.humidity}%`,
    `🌡 Feels: ${info.cat}`
  ].map(t=>`<span class="weather-tag">${t}</span>`).join('');
  document.getElementById('weather-display').classList.add('show');

  // Now call Groq for AI recommendations
  document.getElementById('results').innerHTML=`
    <div class="loading-state">
      <i class="fas fa-sparkles"></i>
      <p>AI is styling your outfit for ${info.desc} weather in ${weather.city}…</p>
    </div>`;

  try{
    const wardrobeDesc=wardrobeItems.map(i=>`${i.category}: ${i.name} (${i.color}, ${i.style})`).join('\n');
    const weatherDesc=`${weather.temp}${weather.unit}, ${info.desc}, ${info.cat} conditions`;
    const res=await fetch('/api/recommend',{method:'POST',headers:H(),body:JSON.stringify({wardrobe:wardrobeDesc,occasion,weather:weatherDesc})});
    const data=await res.json();
    if(!res.ok) throw new Error(data.error||'AI error');

    let aiText=data.result.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();
    const s=aiText.indexOf('['),e=aiText.lastIndexOf(']');
    if(s===-1||e===-1) throw new Error('Could not parse AI response. Try again.');
    const outfits=JSON.parse(aiText.substring(s,e+1));
    displayOutfits(outfits,weather,info);
  }catch(e){
    document.getElementById('results').innerHTML=`<div class="error-state"><i class="fas fa-exclamation-circle"></i> ${e.message}</div>`;
  }
  setLoading(false);
}

function displayOutfits(outfits,weather,info){
  const html=outfits.map(o=>{
    const items=o.items.map(n=>wardrobeItems.find(w=>w.name.toLowerCase().trim()===n.toLowerCase().trim())).filter(Boolean);
    return `<div class="outfit-card">
      <h4><i class="fas fa-star"></i>${o.name}</h4>
      <div class="outfit-items-list">
        ${items.map(item=>`<div class="outfit-item-chip">
          <img src="${item.image||''}" alt="${item.name}" onerror="this.style.display='none'"/>
          <div><div class="chip-name">${item.name}</div><div class="chip-cat">${item.category} · ${item.color}</div></div>
        </div>`).join('')}
      </div>
      <div class="outfit-reasoning"><strong><i class="fas fa-lightbulb"></i> Why it works:</strong> ${o.reasoning}</div>
    </div>`;
  }).filter(h=>h).join('');
  document.getElementById('results').innerHTML=`
    <h2 style="font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--dark);margin-bottom:22px;text-align:center;">
      <i class="fas fa-magic" style="background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;"></i>
      Outfits for ${info.emoji} ${weather.city}
    </h2>
    <div class="outfit-grid">${html}</div>`;
}

function setLoading(on){
  document.getElementById('gen-btn').disabled=on;
  document.getElementById('gen-txt').style.display=on?'none':'inline';
  document.getElementById('gen-icon').style.display=on?'none':'inline-block';
  document.getElementById('gen-spin').style.display=on?'block':'none';
}

async function doLogout(){
  await fetch('/api/auth/logout',{method:'POST',headers:H()});
  localStorage.removeItem('rm_token');
  window.location.href='/login';
}

const _f=window.fetch;
window.fetch=function(url,opts={}){
  if(typeof url==='string'&&url.startsWith('/api/')){opts.headers=Object.assign({},opts.headers||{},{'Authorization':'Bearer '+TOKEN()});}
  return _f.call(this,url,opts);
};

init();
</script>
</body>
</html>
