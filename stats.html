<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StyleAI — Style Stats</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --primary:#c084fc;--secondary:#f472b6;--accent:#fbbf24;
  --dark:#18181b;--text:#27272a;--border:#e4e4e7;--success:#22c55e;
  --gradient:linear-gradient(135deg,#c084fc 0%,#f472b6 50%,#fbbf24 100%);
  --shadow:0 20px 60px rgba(192,132,252,0.15);
}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(180deg,#faf5ff 0%,#fef3c7 100%);min-height:100vh;color:var(--text);line-height:1.6;}
nav{background:rgba(255,255,255,0.9);backdrop-filter:blur(20px);padding:20px 0;box-shadow:0 4px 30px rgba(0,0,0,0.05);border-bottom:1px solid rgba(192,132,252,0.1);position:sticky;top:0;z-index:100;}
.nav-inner{max-width:1400px;margin:0 auto;padding:0 30px;display:flex;align-items:center;justify-content:space-between;gap:20px;}
.logo{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;}
.nav-links{display:flex;gap:6px;flex-wrap:wrap;}
.nav-link{padding:9px 16px;border-radius:10px;font-size:14px;font-weight:600;color:#52525b;text-decoration:none;cursor:pointer;border:none;background:none;transition:all 0.2s;white-space:nowrap;}
.nav-link:hover{background:#faf5ff;color:var(--primary);}
.nav-link.active{background:var(--gradient);color:#fff;}
.nav-user{display:flex;align-items:center;gap:10px;font-size:14px;color:#52525b;white-space:nowrap;}
.nav-user strong{color:var(--dark);}
.logout-btn{padding:8px 16px;border:2px solid var(--border);border-radius:10px;background:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;color:#71717a;cursor:pointer;transition:all 0.2s;}
.logout-btn:hover{border-color:var(--primary);color:var(--primary);}

.container{max-width:1400px;margin:0 auto;padding:50px 30px;}
.page-header{text-align:center;margin-bottom:50px;}
.page-header h1{font-family:'Playfair Display',serif;font-size:3rem;font-weight:900;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1px;margin-bottom:12px;}
.page-header p{color:#71717a;font-size:1.1rem;}

/* Summary cards */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px;margin-bottom:40px;}
.summary-card{background:#fff;border-radius:20px;padding:28px 24px;text-align:center;border:1px solid var(--border);box-shadow:0 5px 20px rgba(0,0,0,0.05);transition:all 0.3s;}
.summary-card:hover{transform:translateY(-6px);box-shadow:var(--shadow);}
.summary-card .s-icon{width:50px;height:50px;background:var(--gradient);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
.summary-card .s-icon i{font-size:1.4rem;color:#fff;}
.summary-card .s-num{font-family:'Playfair Display',serif;font-size:2.4rem;font-weight:900;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.summary-card .s-label{color:#71717a;font-size:13px;font-weight:600;margin-top:4px;}

/* Charts grid */
.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:28px;margin-bottom:40px;}
.chart-card{background:#fff;border-radius:20px;padding:30px;border:1px solid var(--border);box-shadow:0 5px 20px rgba(0,0,0,0.05);}
.chart-card h3{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--dark);margin-bottom:6px;}
.chart-card .chart-sub{color:#71717a;font-size:13px;margin-bottom:22px;}
.chart-wrap{position:relative;height:260px;}

/* Most/least worn */
.worn-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:28px;margin-bottom:40px;}
.worn-card{background:#fff;border-radius:20px;padding:30px;border:1px solid var(--border);box-shadow:0 5px 20px rgba(0,0,0,0.05);}
.worn-card h3{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--dark);margin-bottom:20px;}
.worn-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #fafaf9;}
.worn-item:last-child{border-bottom:none;}
.worn-item-info{display:flex;align-items:center;gap:12px;}
.worn-rank{width:28px;height:28px;background:var(--gradient);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
.worn-name{font-weight:600;font-size:14px;color:var(--dark);}
.worn-cat{font-size:11px;color:#71717a;margin-top:2px;}
.worn-count{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:900;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.worn-times{font-size:11px;color:#71717a;text-align:right;}

/* Style breakdown bar */
.style-bars{margin-top:8px;}
.style-bar-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.style-bar-label{width:90px;font-size:13px;font-weight:600;color:var(--dark);flex-shrink:0;}
.style-bar-track{flex:1;height:10px;background:#f4f4f5;border-radius:10px;overflow:hidden;}
.style-bar-fill{height:100%;border-radius:10px;background:var(--gradient);transition:width 1s cubic-bezier(.22,1,.36,1);}
.style-bar-pct{width:36px;text-align:right;font-size:13px;font-weight:700;color:var(--primary);flex-shrink:0;}

/* History heatmap */
.heatmap-card{background:#fff;border-radius:20px;padding:30px;border:1px solid var(--border);box-shadow:0 5px 20px rgba(0,0,0,0.05);margin-bottom:40px;}
.heatmap-card h3{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--dark);margin-bottom:6px;}
.heatmap-card .chart-sub{color:#71717a;font-size:13px;margin-bottom:22px;}
.heatmap-months{display:flex;gap:4px;overflow-x:auto;padding-bottom:8px;}
.heatmap-month{flex-shrink:0;}
.heatmap-month-label{font-size:11px;color:#71717a;font-weight:600;margin-bottom:6px;text-align:center;}
.heatmap-weeks{display:flex;gap:3px;}
.heatmap-col{display:flex;flex-direction:column;gap:3px;}
.heatmap-cell{width:13px;height:13px;border-radius:3px;background:#f4f4f5;transition:all 0.2s;cursor:default;}
.heatmap-cell.l1{background:#f3e8ff;}
.heatmap-cell.l2{background:#d8b4fe;}
.heatmap-cell.l3{background:#c084fc;}
.heatmap-cell.l4{background:#9333ea;}
.heatmap-legend{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:12px;color:#71717a;}
.heatmap-legend .heatmap-cell{cursor:default;}

/* Empty state */
.empty-stats{text-align:center;padding:80px 20px;}
.empty-stats i{font-size:4rem;color:#a1a1aa;margin-bottom:20px;}
.empty-stats h3{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--dark);margin-bottom:12px;}
.empty-stats p{color:#71717a;font-size:1.05rem;}
.empty-stats a{display:inline-block;margin-top:24px;padding:14px 32px;background:var(--gradient);color:#fff;border-radius:50px;font-weight:700;text-decoration:none;box-shadow:var(--shadow);}

@media(max-width:768px){
  .charts-grid,.worn-grid{grid-template-columns:1fr;}
  .nav-links{display:none;}
  .page-header h1{font-size:2.2rem;}
}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <div class="logo"><i class="fas fa-gem"></i> StyleAI</div>
    <div class="nav-links">
      <a class="nav-link" href="/app">✨ Wardrobe</a>
      <a class="nav-link active" href="/stats">📊 Stats</a>
      <a class="nav-link" href="/weather">🌤 Weather Stylist</a>
      <a class="nav-link" href="/packing">🧳 Packing AI</a>
    </div>
    <div class="nav-user">
      <span>👤 <strong id="bar-user">…</strong></span>
      <button class="logout-btn" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
    </div>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1><i class="fas fa-chart-pie"></i> Style Stats</h1>
    <p>Deep insights into your wardrobe and wearing habits</p>
  </div>

  <div id="stats-content">
    <!-- filled by JS -->
  </div>
</div>

<script>
const TOKEN = ()=>localStorage.getItem('rm_token')||'';
const H = ()=>({'Content-Type':'application/json','Authorization':'Bearer '+TOKEN()});

async function init(){
  // auth check
  try{
    const r=await fetch('/api/me',{headers:H()});
    if(!r.ok){window.location.href='/login';return;}
    const d=await r.json();
    document.getElementById('bar-user').textContent=d.username;
  }catch(e){window.location.href='/login';return;}

  const [wRes,hRes]=await Promise.all([
    fetch('/api/wardrobe',{headers:H()}),
    fetch('/api/history',{headers:H()})
  ]);
  const wardrobe=await wRes.json();
  const history=await hRes.json();

  if(!wardrobe.length && !history.length){
    document.getElementById('stats-content').innerHTML=`
      <div class="empty-stats">
        <i class="fas fa-chart-pie"></i>
        <h3>No data yet</h3>
        <p>Add items to your wardrobe and log some outfits to see your style stats here.</p>
        <a href="/app">Go to Wardrobe →</a>
      </div>`;
    return;
  }

  buildStats(wardrobe,history);
}

function buildStats(wardrobe,history){
  // ── Compute ──────────────────────────────────────────────────────────────
  const totalItems=wardrobe.length;
  const totalOutfits=history.length;

  // category counts
  const catCount={};
  wardrobe.forEach(i=>{catCount[i.category]=(catCount[i.category]||0)+1;});

  // style counts
  const styleCount={};
  wardrobe.forEach(i=>{if(i.style)styleCount[i.style]=(styleCount[i.style]||0)+1;});

  // color counts
  const colorCount={};
  wardrobe.forEach(i=>{if(i.color){const c=i.color.toLowerCase().trim();colorCount[c]=(colorCount[c]||0)+1;}});
  const topColors=Object.entries(colorCount).sort((a,b)=>b[1]-a[1]).slice(0,6);

  // item wear frequency from history
  const itemWears={};
  history.forEach(h=>{(h.items||[]).forEach(name=>{itemWears[name]=(itemWears[name]||0)+1;});});
  const sortedWears=Object.entries(itemWears).sort((a,b)=>b[1]-a[1]);
  const mostWorn=sortedWears.slice(0,5);
  const leastWorn=sortedWears.slice(-5).reverse();

  // occasion breakdown
  const occCount={};
  history.forEach(h=>{if(h.occasion)occCount[h.occasion]=(occCount[h.occasion]||0)+1;});

  // heatmap data: date -> count
  const dateMap={};
  history.forEach(h=>{if(h.date_worn)dateMap[h.date_worn]=(dateMap[h.date_worn]||0)+1;});

  // ── Render ────────────────────────────────────────────────────────────────
  const mostWornColor=topColors[0]?topColors[0][0]:'—';
  const mostWornCat=Object.entries(catCount).sort((a,b)=>b[1]-a[1])[0];

  document.getElementById('stats-content').innerHTML=`
    <div class="summary-grid">
      <div class="summary-card"><div class="s-icon"><i class="fas fa-tshirt"></i></div><div class="s-num">${totalItems}</div><div class="s-label">Total Items</div></div>
      <div class="summary-card"><div class="s-icon"><i class="fas fa-star"></i></div><div class="s-num">${totalOutfits}</div><div class="s-label">Outfits Logged</div></div>
      <div class="summary-card"><div class="s-icon"><i class="fas fa-palette"></i></div><div class="s-num" style="font-size:1.3rem;padding-top:4px">${mostWornColor}</div><div class="s-label">Top Colour</div></div>
      <div class="summary-card"><div class="s-icon"><i class="fas fa-folder"></i></div><div class="s-num" style="font-size:1.3rem;padding-top:4px">${mostWornCat?mostWornCat[0]:'—'}</div><div class="s-label">Biggest Category</div></div>
      <div class="summary-card"><div class="s-icon"><i class="fas fa-redo"></i></div><div class="s-num">${mostWorn[0]?mostWorn[0][1]:0}</div><div class="s-label">Most Times Worn</div></div>
    </div>

    <div class="charts-grid">
      <div class="chart-card">
        <h3><i class="fas fa-layer-group"></i> Wardrobe by Category</h3>
        <div class="chart-sub">How your wardrobe is distributed across categories</div>
        <div class="chart-wrap"><canvas id="catChart"></canvas></div>
      </div>
      <div class="chart-card">
        <h3><i class="fas fa-calendar-check"></i> Occasion Breakdown</h3>
        <div class="chart-sub">What occasions you dress for most</div>
        <div class="chart-wrap"><canvas id="occChart"></canvas></div>
      </div>
      <div class="chart-card">
        <h3><i class="fas fa-palette"></i> Top Colours in Wardrobe</h3>
        <div class="chart-sub">Most common colours across all your items</div>
        <div class="chart-wrap"><canvas id="colorChart"></canvas></div>
      </div>
      <div class="chart-card">
        <h3><i class="fas fa-tshirt"></i> Style Distribution</h3>
        <div class="chart-sub">How your wardrobe breaks down by style</div>
        <div class="style-bars" id="styleBars"></div>
      </div>
    </div>

    <div class="worn-grid">
      <div class="worn-card">
        <h3>🔥 Most Worn Items</h3>
        <div id="mostWornList"></div>
      </div>
      <div class="worn-card">
        <h3>😴 Least Worn Items</h3>
        <div id="leastWornList"></div>
      </div>
    </div>

    <div class="heatmap-card">
      <h3><i class="fas fa-fire"></i> Outfit Activity</h3>
      <div class="chart-sub">Days you logged outfits in the past 6 months</div>
      <div class="heatmap-months" id="heatmap"></div>
      <div class="heatmap-legend">
        Less <div class="heatmap-cell"></div><div class="heatmap-cell l1"></div><div class="heatmap-cell l2"></div><div class="heatmap-cell l3"></div><div class="heatmap-cell l4"></div> More
      </div>
    </div>
  `;

  drawCharts(catCount,occCount,topColors,styleCount,totalItems,mostWorn,leastWorn,wardrobe,dateMap);
}

function drawCharts(catCount,occCount,topColors,styleCount,totalItems,mostWorn,leastWorn,wardrobe,dateMap){
  const GRAD_COLORS=['#c084fc','#f472b6','#fbbf24','#34d399','#60a5fa','#f87171','#a78bfa','#fb923c'];

  // Category donut
  const catLabels=Object.keys(catCount);
  const catData=Object.values(catCount);
  new Chart(document.getElementById('catChart'),{
    type:'doughnut',
    data:{labels:catLabels,datasets:[{data:catData,backgroundColor:GRAD_COLORS,borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{family:'DM Sans',size:12},padding:16}}}}
  });

  // Occasion bar
  const occLabels=Object.keys(occCount);
  const occData=Object.values(occCount);
  if(occLabels.length){
    new Chart(document.getElementById('occChart'),{
      type:'bar',
      data:{labels:occLabels,datasets:[{label:'Outfits',data:occData,backgroundColor:'rgba(192,132,252,0.7)',borderColor:'#c084fc',borderWidth:2,borderRadius:8}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1,font:{family:'DM Sans'}},grid:{color:'#f4f4f5'}},x:{ticks:{font:{family:'DM Sans'}},grid:{display:false}}}}
    });
  } else {
    document.getElementById('occChart').parentElement.innerHTML+='<div style="text-align:center;color:#a1a1aa;padding:40px 0;font-size:14px">No occasion data yet — log some outfits!</div>';
  }

  // Colors bar
  const colorLabels=topColors.map(c=>c[0]);
  const colorData=topColors.map(c=>c[1]);
  if(colorLabels.length){
    new Chart(document.getElementById('colorChart'),{
      type:'bar',
      data:{labels:colorLabels,datasets:[{label:'Items',data:colorData,backgroundColor:GRAD_COLORS.slice(0,colorLabels.length),borderRadius:8,borderWidth:0}]},
      options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,ticks:{stepSize:1,font:{family:'DM Sans'}},grid:{color:'#f4f4f5'}},y:{ticks:{font:{family:'DM Sans',size:13}},grid:{display:false}}}}
    });
  }

  // Style bars
  const styleTotal=Object.values(styleCount).reduce((a,b)=>a+b,0)||1;
  const styleSorted=Object.entries(styleCount).sort((a,b)=>b[1]-a[1]);
  document.getElementById('styleBars').innerHTML=styleSorted.map(([s,n])=>{
    const pct=Math.round(n/styleTotal*100);
    return `<div class="style-bar-row">
      <div class="style-bar-label">${s}</div>
      <div class="style-bar-track"><div class="style-bar-fill" style="width:${pct}%"></div></div>
      <div class="style-bar-pct">${pct}%</div>
    </div>`;
  }).join('');
  if(!styleSorted.length) document.getElementById('styleBars').innerHTML='<div style="color:#a1a1aa;text-align:center;padding:30px 0;font-size:14px">No style data yet</div>';

  // Most/least worn lists
  function wornItemHTML(arr){
    if(!arr.length) return '<div style="color:#a1a1aa;text-align:center;padding:20px 0;font-size:14px">No wear data yet — log outfits to track this!</div>';
    return arr.map(([name,count],i)=>{
      const item=wardrobe.find(w=>w.name===name);
      return `<div class="worn-item">
        <div class="worn-item-info">
          <div class="worn-rank">${i+1}</div>
          <div><div class="worn-name">${name}</div><div class="worn-cat">${item?item.category:'—'} · ${item?item.color:'—'}</div></div>
        </div>
        <div><div class="worn-count">${count}</div><div class="worn-times">${count===1?'time':'times'}</div></div>
      </div>`;
    }).join('');
  }
  document.getElementById('mostWornList').innerHTML=wornItemHTML(mostWorn);
  document.getElementById('leastWornList').innerHTML=wornItemHTML(leastWorn);

  // Heatmap (last 26 weeks)
  buildHeatmap(dateMap);
}

function buildHeatmap(dateMap){
  const today=new Date();
  const weeks=26;
  // Start from 26 weeks ago, Monday
  const start=new Date(today);
  start.setDate(start.getDate()-weeks*7);
  // Snap to Monday
  const dow=start.getDay()||7;
  if(dow!==1) start.setDate(start.getDate()-(dow-1));

  const months=[];
  let cur=new Date(start);
  let curMonth=null,curWeeks=null,curWeek=null;

  while(cur<=today){
    const mKey=cur.toLocaleString('default',{month:'short'});
    if(mKey!==curMonth){
      if(curMonth){if(curWeek)curWeeks.push(curWeek);months.push({label:curMonth,weeks:curWeeks});}
      curMonth=mKey;curWeeks=[];curWeek=[];
    }
    if(cur.getDay()===1&&curWeek.length){curWeeks.push(curWeek);curWeek=[];}
    const dateStr=cur.toISOString().split('T')[0];
    const count=dateMap[dateStr]||0;
    const level=count===0?'':count===1?'l1':count===2?'l2':count===3?'l3':'l4';
    curWeek.push({date:dateStr,count,level});
    cur.setDate(cur.getDate()+1);
  }
  if(curWeek.length){curWeeks.push(curWeek);}
  if(curMonth){months.push({label:curMonth,weeks:curWeeks});}

  document.getElementById('heatmap').innerHTML=months.map(m=>`
    <div class="heatmap-month">
      <div class="heatmap-month-label">${m.label}</div>
      <div class="heatmap-weeks">
        ${m.weeks.map(w=>`<div class="heatmap-col">${w.map(d=>`<div class="heatmap-cell ${d.level}" title="${d.date}${d.count?' · '+d.count+' outfit'+(d.count>1?'s':''):''}"></div>`).join('')}</div>`).join('')}
      </div>
    </div>`).join('');
}

async function doLogout(){
  await fetch('/api/auth/logout',{method:'POST',headers:H()});
  localStorage.removeItem('rm_token');
  window.location.href='/login';
}

// Patch fetch for auth
const _f=window.fetch;
window.fetch=function(url,opts={}){
  if(typeof url==='string'&&url.startsWith('/api/')){opts.headers=Object.assign({},opts.headers||{},{'Authorization':'Bearer '+TOKEN()});}
  return _f.call(this,url,opts);
};

init();
</script>
</body>
</html>
